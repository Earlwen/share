<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nautobot 拓扑（ECharts）</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "WenQuanYi Micro Hei", sans-serif; background: #0f172a; color: #e2e8f0; }
    #app { display: flex; height: 100%; }
    #toolbar { width: 300px; border-right: 1px solid #1f2937; padding: 12px; box-sizing: border-box; background: #111827; }
    #chart { flex: 1; height: 100%; }
    input, button { width: 100%; box-sizing: border-box; }
    input { margin: 6px 0; padding: 8px 10px; border: 1px solid #374151; background: #0b1220; color: #e5e7eb; border-radius: 6px; }
    button { margin: 6px 0; padding: 8px 10px; border: 1px solid #374151; background: #1f2937; color: #e5e7eb; border-radius: 6px; }
    button:hover { background: #0b1220; }
    .hint { font-size: 12px; color: #9ca3af; line-height: 1.4; }
    .row { display: flex; gap: 8px; }
    .row button { flex: 1; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <h3 style="margin:0 0 8px 0">拓扑图（ECharts）</h3>
      <div id="hint" class="hint">数据源：/api/graphql/（通过本地 /proxy 转发 Token）</div>
      <input id="baseUrl" value="http://172.16.114.128:8080" />
      <input id="token" type="password" placeholder="Nautobot Token" />
      <input id="iconBase" placeholder="Cisco 图标 Base URL（可选，如 http://.../icons）" />
      <input id="locationFilter" list="locationList" placeholder="Location 过滤（下拉/输入提示）" />
      <datalist id="locationList"></datalist>
      <input id="deviceFilter" placeholder="设备名字过滤（支持模糊匹配/逗号分隔）" />
      <label style="display:flex; align-items:center; gap:8px; margin: 6px 0; font-size: 12px; color:#e5e7eb;">
        <input id="showIsolated" type="checkbox" checked style="width:auto; margin:0;" />
        显示无关联节点
      </label>
      <button id="load">从 GraphQL 加载</button>
      <div class="row">
        <button id="applyFilter">应用设备名称过滤</button>
        <button id="clearFilter">清空设备名称过滤</button>
      </div>
      <div class="row">
        <button id="applyLocation">应用Location</button>
        <button id="clearLocation">清空Location</button>
      </div>
      <div class="row">
        <button id="layoutForce">力导向</button>
        <button id="layoutH">横向</button>
        <button id="layoutV">纵向</button>
      </div>
      <button id="export">导出JSON</button>
    </div>
    <div id="chart"></div>
  </div>

  <script>
    const hint = document.getElementById("hint");
    const baseUrlEl = document.getElementById("baseUrl");
    const tokenEl = document.getElementById("token");
    const iconBaseEl = document.getElementById("iconBase");

    const chart = echarts.init(document.getElementById("chart"), null, { renderer: "canvas" });
    window.addEventListener("resize", () => chart.resize());

    function normalizeBase(u) {
      return String(u || "").replace(/\/+$/, "");
    }

    function svgToDataUri(svg) {
      return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
    }

    const fallbackIcons = {
      router: svgToDataUri(`<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64"><rect x="10" y="18" width="44" height="28" rx="8" fill="#0ea5e9"/><circle cx="22" cy="32" r="3" fill="#e2e8f0"/><circle cx="42" cy="32" r="3" fill="#e2e8f0"/><path d="M26 32h12" stroke="#e2e8f0" stroke-width="2"/></svg>`),
      switch: svgToDataUri(`<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64"><rect x="8" y="20" width="48" height="24" rx="6" fill="#22c55e"/><rect x="16" y="28" width="6" height="6" fill="#052e16"/><rect x="26" y="28" width="6" height="6" fill="#052e16"/><rect x="36" y="28" width="6" height="6" fill="#052e16"/><rect x="46" y="28" width="6" height="6" fill="#052e16"/></svg>`),
      firewall: svgToDataUri(`<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64"><rect x="14" y="16" width="36" height="32" rx="6" fill="#f97316"/><path d="M18 24h28M18 32h28M18 40h28" stroke="#fff7ed" stroke-width="3"/><path d="M24 16v32M40 16v32" stroke="#fff7ed" stroke-width="3"/></svg>`),
      server: svgToDataUri(`<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64"><rect x="16" y="14" width="32" height="14" rx="4" fill="#a855f7"/><rect x="16" y="34" width="32" height="16" rx="4" fill="#a855f7"/><circle cx="24" cy="21" r="2" fill="#f5f3ff"/><circle cx="24" cy="41" r="2" fill="#f5f3ff"/><path d="M30 21h14M30 41h14" stroke="#f5f3ff" stroke-width="2"/></svg>`)
    };

    function guessDeviceType(name) {
      const n = String(name || "").toLowerCase();
      if (n.includes("sw") || n.includes("switch")) return "switch";
      if (n.includes("fw") || n.includes("firewall")) return "firewall";
      if (n.includes("srv") || n.includes("server")) return "server";
      if (n.includes("rt") || n.includes("router")) return "router";
      return "router";
    }

    function resolveIcon(name) {
      const type = guessDeviceType(name);
      const base = normalizeBase(iconBaseEl.value.trim());
      if (base) return "image://" + base + "/" + type + ".svg";
      return "image://" + (fallbackIcons[type] || fallbackIcons.router);
    }

    function ipLabel(ips) {
      if (!ips || !ips.length) return "";
      const list = ips.map(x => x && x.address).filter(Boolean);
      return Array.from(new Set(list)).slice(0, 2).join(",");
    }

    function makeIfLabel(name, ips) {
      const ip = ipLabel(ips);
      const n = String(name || "");
      if (n && ip) return n + " " + ip;
      return n || ip;
    }

    async function graphqlQuery(query) {
      const base = normalizeBase(baseUrlEl.value.trim());
      const token = tokenEl.value.trim();
      const url = base + "/api/graphql/";
      const headers = { "Content-Type": "application/json", "Accept": "application/json" };
      if (token) headers["Authorization"] = "Token " + token;
      const proxied = "/proxy?url=" + encodeURIComponent(url);
      const res = await fetch(proxied, { method: "POST", headers, body: JSON.stringify({ query }) });
      const text = await res.text();
      if (!res.ok) {
        const msg = (text || "").slice(0, 200).replace(/\s+/g, " ").trim();
        throw new Error("HTTP " + res.status + (msg ? (": " + msg) : ""));
      }
      const json = JSON.parse(text);
      if (json.errors && json.errors.length) throw new Error(json.errors[0].message || "GraphQL error");
      return json.data;
    }

    function buildGraph(data) {
      const devices = (data && data.devices) ? data.devices : [];
      const deviceLocationByName = new Map();
      devices.forEach(d => {
        const dn = d && d.name ? String(d.name) : "";
        const ln = d && d.location && d.location.name ? String(d.location.name) : "";
        if (dn && ln) deviceLocationByName.set(dn, ln);
      });
      const nodeMap = new Map();
      function ensureNode(name, locationName) {
        if (!name) return;
        if (nodeMap.has(name)) return;
        const loc = locationName || deviceLocationByName.get(name) || "";
        nodeMap.set(name, {
          id: name,
          name,
          locationName: loc,
          symbol: resolveIcon(name),
          symbolSize: 40,
          draggable: true,
          label: { show: true, color: "#e2e8f0", fontSize: 12 }
        });
      }
      devices.forEach(d => ensureNode(d && d.name));

      const links = [];
      const seen = new Set();
      devices.forEach(d => {
        const srcDev = d && d.name;
        const srcLoc = d && d.location && d.location.name ? String(d.location.name) : "";
        const ifs = d && d.interfaces ? d.interfaces : [];
        ifs.forEach(intf => {
          const ci = intf && intf.connected_interface ? intf.connected_interface : null;
          if (!ci) return;
          const dstDev = ci.device && ci.device.name ? ci.device.name : "";
          if (!srcDev || !dstDev) return;
          ensureNode(srcDev, srcLoc);
          ensureNode(dstDev);
          const aKey = [srcDev, intf.name || ""].join(":");
          const bKey = [dstDev, ci.name || ""].join(":");
          const key = [aKey, bKey].sort().join("<->");
          if (seen.has(key)) return;
          seen.add(key);
          const sLabel = makeIfLabel(intf.name || "", intf.ip_addresses || []);
          const tLabel = makeIfLabel(ci.name || "", ci.ip_addresses || []);
          links.push({
            source: srcDev,
            target: dstDev,
            label: sLabel + " ⇄ " + tLabel
          });
        });
      });

      return { nodes: Array.from(nodeMap.values()), links };
    }

    function computeLayers(nodes, links) {
      const ids = nodes.map(n => n.id);
      const adj = new Map(ids.map(id => [id, []]));
      links.forEach(l => {
        if (adj.has(l.source)) adj.get(l.source).push(l.target);
        if (adj.has(l.target)) adj.get(l.target).push(l.source);
      });
      const level = new Map();
      for (const start of ids) {
        if (level.has(start)) continue;
        level.set(start, 0);
        const q = [start];
        for (let qi = 0; qi < q.length; qi++) {
          const u = q[qi];
          const lu = level.get(u);
          (adj.get(u) || []).forEach(v => {
            if (!level.has(v)) {
              level.set(v, lu + 1);
              q.push(v);
            }
          });
        }
      }
      const layers = [];
      ids.forEach(id => {
        const l = level.get(id) || 0;
        if (!layers[l]) layers[l] = [];
        layers[l].push(id);
      });
      return layers.filter(Boolean);
    }

    let current = { nodes: [], links: [] };
    let fullGraph = { nodes: [], links: [] };
    let currentLayout = "force";

    function updateLocationOptions(graph) {
      const list = document.getElementById("locationList");
      const values = Array.from(new Set((graph.nodes || []).map(n => n.locationName).filter(Boolean)));
      values.sort((a, b) => a.localeCompare(b));
      list.innerHTML = "";
      values.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        list.appendChild(opt);
      });
    }

    function filterByLocation(graph) {
      const raw = (document.getElementById("locationFilter").value || "").trim();
      if (!raw) return graph;
      const term = raw.toLowerCase();
      const kept = graph.nodes.filter(n => String(n.locationName || "").toLowerCase().includes(term));
      const keptSet = new Set(kept.map(n => n.id));
      const keptLinks = graph.links.filter(l => keptSet.has(l.source) && keptSet.has(l.target));
      return { nodes: kept, links: keptLinks };
    }

    function filterByDeviceName(graph) {
      const raw = document.getElementById("deviceFilter").value || "";
      const terms = raw.split(",").map(s => s.trim()).filter(Boolean);
      if (terms.length === 0) return { graph, matched: [] };
      const lowerTerms = terms.map(t => t.toLowerCase());
      const matched = graph.nodes.filter(n => {
        const name = String(n.name || n.id || "").toLowerCase();
        return lowerTerms.some(t => name.includes(t));
      }).map(n => n.id);
      if (matched.length === 0) return { graph: { nodes: [], links: [] }, matched: [] };
      const adj = new Map();
      graph.nodes.forEach(n => adj.set(n.id, []));
      graph.links.forEach(l => {
        if (adj.has(l.source)) adj.get(l.source).push(l.target);
        if (adj.has(l.target)) adj.get(l.target).push(l.source);
      });
      const kept = new Set();
      const q = [];
      matched.forEach(id => {
        if (!kept.has(id)) {
          kept.add(id);
          q.push(id);
        }
      });
      for (let qi = 0; qi < q.length; qi++) {
        const u = q[qi];
        (adj.get(u) || []).forEach(v => {
          if (!kept.has(v)) {
            kept.add(v);
            q.push(v);
          }
        });
      }
      const nodes = graph.nodes.filter(n => kept.has(n.id));
      const links = graph.links.filter(l => kept.has(l.source) && kept.has(l.target));
      return { graph: { nodes, links }, matched };
    }

    function filterIsolated(graph) {
      const show = document.getElementById("showIsolated").checked;
      if (show) return graph;
      const deg = new Map();
      graph.nodes.forEach(n => deg.set(n.id, 0));
      graph.links.forEach(l => {
        deg.set(l.source, (deg.get(l.source) || 0) + 1);
        deg.set(l.target, (deg.get(l.target) || 0) + 1);
      });
      const kept = graph.nodes.filter(n => (deg.get(n.id) || 0) > 0);
      const keptSet = new Set(kept.map(n => n.id));
      const keptLinks = graph.links.filter(l => keptSet.has(l.source) && keptSet.has(l.target));
      return { nodes: kept, links: keptLinks };
    }

    function applyIsolatedFilterAndRender() {
      const step0 = filterByLocation(fullGraph);
      const step1 = filterByDeviceName(step0);
      current = filterIsolated(step1.graph);
      if (currentLayout === "horizontal") {
        applyLayered("horizontal");
        return;
      }
      if (currentLayout === "vertical") {
        applyLayered("vertical");
        return;
      }
      render("force");
    }

    function render(layout) {
      currentLayout = layout;
      const series = {
        type: "graph",
        layout: layout === "force" ? "force" : "none",
        roam: true,
        data: current.nodes,
        links: current.links,
        draggable: true,
        edgeSymbol: ["none", "arrow"],
        edgeSymbolSize: [0, 10],
        lineStyle: { color: "#94a3b8", width: 2, curveness: 0 },
        label: { show: true, position: "bottom", color: "#e2e8f0" },
        edgeLabel: {
          show: true,
          formatter: params => params.data.label || "",
          color: "#f8fafc",
          fontSize: 11,
          backgroundColor: "rgba(17,24,39,0.9)",
          padding: [2, 4],
          borderRadius: 4
        },
        emphasis: { focus: "adjacency" },
        force: { repulsion: 260, edgeLength: 140, gravity: 0.08 }
      };
      chart.setOption({
        backgroundColor: "#0f172a",
        tooltip: {
          trigger: "item",
          formatter: params => {
            if (params.dataType === "node") return params.data.name || "";
            if (params.dataType === "edge") return params.data.label || "";
            return "";
          }
        },
        series: [series]
      }, true);
    }

    function applyLayered(orientation) {
      currentLayout = orientation;
      const rect = chart.getDom().getBoundingClientRect();
      const W = rect.width || 1200;
      const H = rect.height || 800;
      const margin = 80;
      const layers = computeLayers(current.nodes, current.links);
      const L = layers.length || 1;
      if (orientation === "horizontal") {
        const xStep = L > 1 ? (W - margin * 2) / (L - 1) : 0;
        layers.forEach((layer, i) => {
          const x = L > 1 ? margin + i * xStep : W / 2;
          const n = layer.length;
          const yStep = n > 0 ? (H - margin * 2) / (n + 1) : 0;
          layer.forEach((id, j) => {
            const node = current.nodes.find(n => n.id === id);
            node.x = x;
            node.y = margin + (j + 1) * yStep;
          });
        });
      } else {
        const yStep = L > 1 ? (H - margin * 2) / (L - 1) : 0;
        layers.forEach((layer, i) => {
          const y = L > 1 ? margin + i * yStep : H / 2;
          const n = layer.length;
          const xStep = n > 0 ? (W - margin * 2) / (n + 1) : 0;
          layer.forEach((id, j) => {
            const node = current.nodes.find(n => n.id === id);
            node.x = margin + (j + 1) * xStep;
            node.y = y;
          });
        });
      }
      render("none");
    }

    document.getElementById("load").addEventListener("click", async () => {
      try {
        hint.textContent = "正在通过 GraphQL 加载数据...";
        const query = `
          query {
            devices {
              name
              location {
                id
                name
              }
              interfaces {
                name
                connected_interface {
                  id
                  name
                  ip_addresses { address }
                  device { name }
                }
                ip_addresses {
                  id
                  address
                  ip4_vdcs { id }
                }
              }
              primary_ip {
                ip4_vdcs { id }
              }
            }
          }
        `;
        const data = await graphqlQuery(query);
        fullGraph = buildGraph(data);
        updateLocationOptions(fullGraph);
        const step0 = filterByLocation(fullGraph);
        const step1 = filterByDeviceName(step0);
        current = filterIsolated(step1.graph);
        const rawDevice = (document.getElementById("deviceFilter").value || "").trim();
        if (step1.matched.length === 0 && rawDevice) {
          hint.textContent = "未匹配到设备，已清空展示（请检查设备名过滤条件）";
        } else {
          hint.textContent = "已生成拓扑：设备数=" + current.nodes.length + "，连线数=" + current.links.length;
        }
        currentLayout = "force";
        render("force");
      } catch (e) {
        hint.textContent = "加载失败：" + String(e && e.message ? e.message : e);
      }
    });

    document.getElementById("layoutForce").addEventListener("click", () => render("force"));
    document.getElementById("layoutH").addEventListener("click", () => applyLayered("horizontal"));
    document.getElementById("layoutV").addEventListener("click", () => applyLayered("vertical"));
    document.getElementById("showIsolated").addEventListener("change", () => {
      applyIsolatedFilterAndRender();
      hint.textContent = "已更新显示选项：设备数=" + current.nodes.length + "，连线数=" + current.links.length;
    });
    document.getElementById("applyLocation").addEventListener("click", () => {
      applyIsolatedFilterAndRender();
      const raw = (document.getElementById("locationFilter").value || "").trim();
      hint.textContent = raw
        ? ("已应用 Location 过滤：设备数=" + current.nodes.length + "，连线数=" + current.links.length)
        : ("未设置 Location，当前显示设备数=" + current.nodes.length + "，连线数=" + current.links.length);
    });
    document.getElementById("clearLocation").addEventListener("click", () => {
      document.getElementById("locationFilter").value = "";
      applyIsolatedFilterAndRender();
      hint.textContent = "已清空 Location 过滤：设备数=" + current.nodes.length + "，连线数=" + current.links.length;
    });
    document.getElementById("applyFilter").addEventListener("click", () => {
      applyIsolatedFilterAndRender();
      const raw = (document.getElementById("deviceFilter").value || "").trim();
      if (!raw) {
        hint.textContent = "已清空设备过滤：设备数=" + current.nodes.length + "，连线数=" + current.links.length;
        return;
      }
      if (current.nodes.length === 0) {
        hint.textContent = "未匹配到设备，已清空展示（请检查设备名过滤条件）";
        return;
      }
      hint.textContent = "已应用设备过滤：设备数=" + current.nodes.length + "，连线数=" + current.links.length;
    });
    document.getElementById("clearFilter").addEventListener("click", () => {
      document.getElementById("deviceFilter").value = "";
      applyIsolatedFilterAndRender();
      hint.textContent = "已清空设备过滤：设备数=" + current.nodes.length + "，连线数=" + current.links.length;
    });
    document.getElementById("deviceFilter").addEventListener("keydown", e => {
      if (e.key !== "Enter") return;
      applyIsolatedFilterAndRender();
      const raw = (document.getElementById("deviceFilter").value || "").trim();
      if (!raw) {
        hint.textContent = "已清空设备过滤：设备数=" + current.nodes.length + "，连线数=" + current.links.length;
        return;
      }
      if (current.nodes.length === 0) {
        hint.textContent = "未匹配到设备，已清空展示（请检查设备名过滤条件）";
        return;
      }
      hint.textContent = "已应用设备过滤：设备数=" + current.nodes.length + "，连线数=" + current.links.length;
    });

    document.getElementById("export").addEventListener("click", () => {
      const payload = JSON.stringify(current, null, 2);
      const blob = new Blob([payload], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "topology.json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    render("force");
  </script>
</body>
</html>
